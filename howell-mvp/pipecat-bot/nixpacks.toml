# nixpacks.toml — explicit build config for Railway NIXPACKS builder
# This file lives in howell-mvp/pipecat-bot/ alongside requirements.txt
# Railway Root Directory must be set to: howell-mvp/pipecat-bot

[phases.setup]
# Python 3.11 + FFmpeg + libsndfile needed by pipecat audio pipeline
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg", "libsndfile"]

[phases.install]
cmds = ["python3.11 -m pip install --upgrade pip", "python3.11 -m pip install -r requirements.txt"]

[start]
cmd = "python3.11 server.py"
